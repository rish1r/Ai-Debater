<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Debate Generator</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <h1 class="wave-title">
      <span>A</span><span>I</span>
      <span>&nbsp;</span>
      <span>D</span><span>e</span><span>b</span><span>a</span><span>t</span
      ><span>e</span>
      <span>&nbsp;</span>
      <span>G</span><span>e</span><span>n</span><span>e</span><span>r</span
      ><span>a</span><span>t</span><span>o</span><span>r</span>
    </h1>

    <input
      class="myBox"
      type="text"
      id="myInput"
      placeholder="What is the desired prompt?(ex:Resolved: Cats are better than dogs.)"
    />

    <button onclick="getValue()">Submit</button>

    <div><p style="color: rgb(255, 255, 255)" id="output"></p></div>

    <script src="script.js"></script>
  </body>
</html>
